<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGNF - Gestão de Notas Fiscais</title>
    <!-- Script oficial do Google -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background-color: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        .logo-text { font-size: 24px; font-weight: bold; margin-bottom: 5px; color: #333; }
        .sub-text { color: #777; font-size: 14px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 14px; color: #555; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background-color: #0f9d58; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn:hover { background-color: #0d8a4d; }
        .toggle-link { color: #0f9d58; cursor: pointer; font-size: 14px; text-decoration: underline; margin-top: 15px; display: block; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #aaa; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
        .google-btn-wrapper { display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-text">SGNF</div>
    <div class="sub-text">Gestão de Notas Fiscais</div> 
    
    <div id="form-container">
        <div class="input-group">
            <label>E-mail</label> 
            <input type="email" id="email" placeholder="admin@sgnf.pt"> 
        </div>
        <div class="input-group">
            <label>Senha</label> 
            <input type="password" id="senha" placeholder="••••••"> 
        </div>
        <button class="btn" id="action-btn" onclick="realizarAcao()">Entrar</button> 
        
        <div class="divider">OU</div>

        <!-- Container do Botão do Google com a sua chave -->
        <div class="google-btn-wrapper">
            <div id="g_id_onload"
                 data-client_id="192576869121-sv3of5f7chikns80jorlu0hrods71t1i.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>

        <span class="toggle-link" onclick="alternarModo()" id="toggle-text">Não tem conta? Cadastre-se</span>
    </div>
</div>

<script>
    localStorage.removeItem('sgnf_auth');

    let isLogin = true;
    
    function alternarModo() {
        isLogin = !isLogin;
        document.getElementById('action-btn').innerText = isLogin ? 'Entrar' : 'Cadastrar';
        document.getElementById('toggle-text').innerText = isLogin ? 'Já tem conta? Faça login' : 'Não tem conta? Cadastre-se';
    }

    async function realizarAcao() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const url = isLogin ? '/api/login' : '/api/cadastro';

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
        });

        const data = await response.json();
        
        if (response.ok) {
            if (isLogin && data.sucesso) {
                localStorage.setItem('sgnf_auth', 'true');
                window.location.href = '/dashboard.html'; 
            } else if (!isLogin) {
                alert(data.mensagem);
                alternarModo(); 
            }
        } else {
            alert("Erro: " + (data.mensagem || data.erro));
        }
    }

    // Processa o login do Google
    async function handleGoogleResponse(response) {
        const serverRes = await fetch('/api/auth/google', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: response.credential })
        });

        const data = await serverRes.json();
        
        if (serverRes.ok && data.sucesso) {
            localStorage.setItem('sgnf_auth', 'true');
            window.location.href = '/dashboard.html';
        } else {
            alert("Erro no Login com Google: " + (data.erro || "Falha desconhecida."));
        }
    }
</script>

</body>
</html>
